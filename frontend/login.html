<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner — Кіру</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { font-size: 28px; color: #333; }
    .logo p { color: #888; margin-top: 5px; }
    .tabs { display: flex; margin-bottom: 25px; border-radius: 10px; overflow: hidden; border: 1px solid #eee; }
    .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; background: #f8f8f8; color: #888; font-size: 14px; transition: all 0.3s; }
    .tab.active { background: #667eea; color: white; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px;
      border: 1px solid #ddd; border-radius: 10px;
      font-size: 14px; outline: none; transition: border 0.3s;
    }
    input:focus { border-color: #667eea; }
    button {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 10px;
      font-size: 16px; cursor: pointer; transition: opacity 0.3s;
    }
    button:hover { opacity: 0.9; }
    .error { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>✈️ Travel Planner</h1>
    <p>Саяхат жоспарлау жүйесі</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">Кіру</div>
    <div class="tab" onclick="showTab('register')">Тіркелу</div>
  </div>

  <!-- Кіру формасы -->
  <div id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label>Құпия сөз</label>
      <input type="password" id="login-password" placeholder="••••••">
    </div>
    <button onclick="login()">Кіру</button>
    <div id="login-error" class="error"></div>
  </div>

  <!-- Тіркелу формасы -->
  <div id="register-form" class="hidden">
    <div class="form-group">
      <label>Аты-жөні</label>
      <input type="text" id="reg-name" placeholder="Аты-жөніңіз">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label>Құпия сөз</label>
      <input type="password" id="reg-password" placeholder="Кемінде 6 символ">
    </div>
    <button onclick="register()">Тіркелу</button>
    <div id="reg-error" class="error"></div>
  </div>
</div>

<script>
const API = 'http://localhost:3000/api';

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!data.success) { errorEl.textContent = data.error; return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('userName', data.data.name);
    window.location.href = 'index.html';
  } catch { errorEl.textContent = 'Сервермен байланыс жоқ'; }
}

async function register() {
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const errorEl = document.getElementById('reg-error');
  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!data.success) { 
      errorEl.textContent = data.error || data.errors?.[0]?.message; 
      return; 
    }
    localStorage.setItem('token', data.token);
    localStorage.setItem('userName', data.data.name);
    window.location.href = 'index.html';
  } catch { errorEl.textContent = 'Сервермен байланыс жоқ'; }
}
</script>
</body>
</html>
