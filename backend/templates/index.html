<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; }
        .navbar { background: #16213e; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { color: #0f3460; color: #e94560; }
        .navbar a { color: #eee; text-decoration: none; margin-left: 20px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .hero { text-align: center; padding: 60px 0; }
        .hero h2 { font-size: 2.5em; margin-bottom: 20px; color: #e94560; }
        .btn { background: #e94560; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; text-decoration: none; display: inline-block; margin: 10px; }
        .btn:hover { background: #c73652; }
        .btn-outline { background: transparent; border: 2px solid #e94560; color: #e94560; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>✈️ Travel Management</h1>
        <div>
            <a href="/login.html">Кіру</a>
            <a href="/register.html">Тіркелу</a>
        </div>
    </nav>
    <div class="container">
        <div class="hero">
            <h2>Саяхат Басқару Жүйесі</h2>
            <p style="margin-bottom:30px; color:#aaa;">Өз саяхаттарыңызды жоспарлаңыз және басқарыңыз</p>
            <a href="/register.html" class="btn">Бастау</a>
            <a href="/login.html" class="btn btn-outline">Кіру</a>
        </div>
    </div>
</body>
</html>
